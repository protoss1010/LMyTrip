                    </section>

                    {/* ═══ 美食 ═══ */}
                    <section ref={el => rf.current.food = el} style={P("#0a1628")}>
                        <div style={W}>
                            <div style={HD}>
                                <div style={TG()}>MUST-EAT GUIDE</div>
                                <h2 style={TL()}>百貨必吃＋晚餐火鍋</h2>
                                <p style={{ fontSize: "0.95rem", color: "rgba(255,255,255,0.28)", marginTop: 3 }}>漢神洲際6大米其林品牌＋全台首家餐廳＋LOPIA超市＋台中限定食藝石頭火鍋！</p>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: "0.9rem" }}>
                                {FOODS.map((f, i) => (
                                    <div key={i} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "1.1rem", display: "flex", flexDirection: "column", gap: "0.5rem", transition: "transform 0.2s, border-color 0.2s" }} onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.borderColor = 'rgba(236,72,153,0.3)'; }} onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.06)'; }}>
                                        <div style={{ display: "flex", gap: "0.8rem", alignItems: "center" }}>
                                            <div style={{ width: 44, height: 44, borderRadius: 10, background: "rgba(236,72,153,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.6rem", flexShrink: 0 }}>{f.e}</div>
                                            <div>
                                                <h4 style={{ fontSize: "0.95rem", fontWeight: 800, color: "#fff", marginBottom: 2 }}>{f.n}</h4>
                                                <div style={{ fontSize: "0.95rem", color: "rgba(255,255,255,0.4)" }}>{f.j}</div>
                                            </div>
                                        </div>
                                        <div style={{ display: "flex", gap: 5, marginTop: 2, flexWrap: "wrap" }}>
                                            <span style={{ fontSize: "0.95rem", padding: "2px 7px", borderRadius: 8, background: f.w === "百貨內" ? "rgba(236,72,153,0.12)" : "rgba(139,92,246,0.12)", color: f.w === "百貨內" ? "#ec4899" : "#8b5cf6", fontWeight: 700 }}>📍 {f.w}</span>
                                            <span style={{ fontSize: "0.95rem", padding: "2px 7px", borderRadius: 8, background: "rgba(245,158,11,0.1)", color: "#f59e0b", fontWeight: 700 }}>{f.k}</span>
                                        </div>
                                        <p style={{ fontSize: "0.92rem", color: "rgba(255,255,255,0.55)", lineHeight: 1.55, marginTop: 4 }}>{f.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ═══ 周邊景點 ═══ */}
                    <section ref={el => rf.current.nearby = el} style={P("#0d2847")}>
                        <div style={W}>
                            <div style={HD}>
                                <div style={TG()}>NEARBY ATTRACTIONS</div>
                                <h2 style={TL()}>周邊景點推薦</h2>
                                <p style={{ fontSize: "0.95rem", color: "rgba(255,255,255,0.28)", marginTop: 3 }}>如果時間充裕，還可以順道造訪這些台中景點！</p>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))", gap: "1rem" }}>
                                {NEARBY.map((spot, i) => (
                                    <div key={i} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "1.2rem", display: "flex", flexDirection: "column", gap: "0.8rem", position: "relative", overflow: "hidden", transition: "transform 0.2s" }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-3px)'} onMouseLeave={e => e.currentTarget.style.transform = 'none'}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.8rem" }}>
                                            <div style={{ width: 50, height: 50, borderRadius: 12, background: "linear-gradient(135deg, rgba(236,72,153,0.15), rgba(139,92,246,0.1))", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.8rem", flexShrink: 0 }}>{spot.e}</div>
                                            <div>
                                                <h3 style={{ fontSize: "0.95rem", fontWeight: 800, color: "#fff", marginBottom: 3 }}>{spot.n}</h3>
                                                <div style={{ fontSize: "0.95rem", color: "#ec4899", fontWeight: 600 }}>🚗 {spot.dist}</div>
                                            </div>
                                        </div>
                                        <p style={{ fontSize: "0.95rem", color: "rgba(255,255,255,0.55)", lineHeight: 1.55 }}>{spot.d}</p>
                                        {spot.url && <a href={spot.url} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: "0.92rem", color: "#ec4899", textDecoration: "none", fontWeight: 600, background: "rgba(236,72,153,0.1)", padding: "5px 12px", borderRadius: 12, marginTop: 2 }}>↗ 查看詳細介紹</a>}
                                    </div>
                                ))}
                            </div>

                            {/* 綠美圖特別提示 */}
                            <div style={{ marginTop: "1.5rem", background: "linear-gradient(135deg, rgba(45,212,191,0.08), rgba(236,72,153,0.05))", border: "1px dashed rgba(45,212,191,0.3)", borderRadius: 12, padding: "1.2rem", display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
                                <div style={{ fontSize: "2.5rem", flexShrink: 0, animation: "float 3s ease-in-out infinite" }}>📚</div>
                                <div style={{ flex: 1, minWidth: 200 }}>
                                    <h3 style={{ fontSize: "0.95rem", fontWeight: 800, color: "#2dd4bf", marginBottom: 6 }}>🌟 亮點推薦：台中綠美圖（SANAA 妹島和世設計）</h3>
                                    <p style={{ fontSize: "0.92rem", color: "rgba(255,255,255,0.6)", lineHeight: 1.55 }}>普立茲克建築獎得主妹島和世操刀設計，將圖書館與美術館合而為一的嶄新文化地標。白色通透的建築外觀宛如漂浮在綠地上的森林，位於水湳經貿園區。兒童繪本區非常豐富，帶小朋友來這裡看書、看展、看建築，一舉三得！</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ═══ 打包清單 ═══ */}
                    <section ref={el => rf.current.checklist = el} style={P("linear-gradient(135deg,#faf4ec,#fce4ec)")}>
                        <div style={W}>
                            <div style={HD}>
                                <div style={TG("#ec4899")}>FAMILY PACKING LIST</div>
                                <h2 style={TL("#0a1628")}>出門準備清單（2大1小）</h2>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(200px,1fr))", gap: "1rem" }}>
                                {Object.entries(CHECKLIST).map(([g, items]) => (
                                    <div key={g}>
                                        <h3 style={{ fontSize: "0.95rem", fontWeight: 700, color: "#0a1628", marginBottom: 6 }}>{g}</h3>
                                        {items.map((it, i) => {
                                            const k = `${g}-${i}`;
                                            const d = !!ck[k];
                                            return (
                                                <div key={k} onClick={() => setCk(p => ({ ...p, [k]: !p[k] }))} style={{ display: "flex", alignItems: "flex-start", gap: 6, padding: "4px 0", cursor: "pointer" }}>
                                                    <div style={{ width: 16, height: 16, borderRadius: 4, border: d ? "none" : "2px solid #e2a5b8", background: d ? "#ec4899" : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1 }}>
                                                        {d && <span style={{ color: "#fff", fontSize: "0.95rem", fontWeight: 900 }}>✓</span>}
                                                    </div>
                                                    <span style={{ fontSize: "0.86rem", color: d ? "#b0a3a8" : "#1e293b", textDecoration: d ? "line-through" : "none" }}>{it}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ─── FOOTER ─── */}
                    <div style={{ background: "#0a1628", borderTop: "1px solid rgba(255,255,255,0.05)", padding: "1.5rem 12px", textAlign: "center" }}>
                        <p style={{ color: "rgba(255,255,255,0.17)", fontSize: "0.95rem", lineHeight: 1.8 }}>
                            🏬 台中親子一日遊完整攻略（2大1小）<br />
                            👨‍👩‍👦 林口A7自駕·漢神洲際＋綠美圖＋水湳中央公園＋食藝石頭火鍋<br />
                            以 <span style={{ color: "#ec4899" }}>♥</span> 製作
                        </p>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>

</html>
