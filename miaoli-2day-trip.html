                                    { url: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Yutengping_Bridge_%28Longteng_Bridge%29_Sanyi%2C_Miaoli_County%2C_%28Taiwan%29.jpg/960px-Yutengping_Bridge_%28Longteng_Bridge%29_Sanyi%2C_Miaoli_County%2C_%28Taiwan%29.jpg", label: "🌉 龍騰斷橋", gc: '3', gr: '1' },

                                        transform: p.crew ? 'rotate(-0.5deg)' : `rotate(${[0,-2,1.5,-1,2,-1.5][i]}deg) scale(${i === heroHL ? 1.08 : 1})`,
                                        transition: 'border 0.6s, transform 0.6s cubic-bezier(0.4,0,0.2,1), box-shadow 0.6s',
                                        boxShadow: p.crew ? '0 10px 40px rgba(45,212,191,0.35), 0 0 24px rgba(45,212,191,0.18)' : (i === heroHL ? '0 8px 32px rgba(45,212,191,0.45), 0 0 16px rgba(45,212,191,0.3)' : '0 4px 14px rgba(0,0,0,0.4)')

                            🚗 好友揪團·龍騰斷橋＋日新島＋哈比丘＋功維敘＋阿水海鮮＋慕雲想莊園<br />
                            以 <span style={{ color: "#2dd4bf" }}>♥</span> 製作
                        </p>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
